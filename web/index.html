<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Расписание занятий</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background-color: #f0f2f5; }
        .card { border-left: 4px solid #3b82f6; }
        select {
            -webkit-appearance: none;
            appearance: none;
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
            background-repeat: no-repeat; background-position: right 1rem center; background-size: 1em;
        }
    </style>
</head>
<body class="p-4 text-gray-800">
    <div class="max-w-md mx-auto">
        <h1 class="text-2xl font-bold text-center mb-6 text-blue-600">Расписание занятий</h1>

        <div class="space-y-3 mb-8">
            <label class="block">
                <span class="text-sm text-gray-500 ml-2">Учебная группа</span>
                <select id="groupSelect" class="w-full mt-1 p-3 rounded-2xl bg-white border-none shadow-sm outline-none"></select>
            </label>
            
            <label class="block">
                <span class="text-sm text-gray-500 ml-2">Дата (День недели)</span>
                <select id="daySelect" class="w-full mt-1 p-3 rounded-2xl bg-white border-none shadow-sm outline-none">
                    <option value="">Сначала выберите группу</option>
                </select>
            </label>
        </div>

        <div id="scheduleContainer" class="space-y-4 pb-10">
            <div class="text-center py-20 opacity-30">Выберите группу для просмотра</div>
        </div>
    </div>

    <script>
        let scheduleData = {};
        const rusDays = ["Воскресенье", "Понедельник", "Вторник", "Среда", "Четверг", "Пятница", "Суббота"];

        async function load() {
            try {
                const response = await fetch('result.json?v=' + Date.now());
                scheduleData = await response.json();
                
                // Заполнение группы
                const groupSelect = document.getElementById('groupSelect');
                let allGroups = new Set();
                Object.values(scheduleData).forEach(dayContent => {
                    Object.keys(dayContent).forEach(g => allGroups.add(g));
                });
                
                groupSelect.innerHTML = '<option value="">Выберите группу...</option>';
                [...allGroups].sort().forEach(g => {
                    let opt = document.createElement('option');
                    opt.value = g; opt.innerText = g;
                    groupSelect.appendChild(opt);
                });

                groupSelect.onchange = populateDays;
                document.getElementById('daySelect').onchange = render;

            } catch (e) {
                document.getElementById('scheduleContainer').innerHTML = '<div class="text-center text-red-500">Ошибка загрузки</div>';
            }
        }

        function populateDays() {
            const group = document.getElementById('groupSelect').value;
            const daySelect = document.getElementById('daySelect');
            daySelect.innerHTML = '';

            if (!group) return;

            // Поиск даты
            Object.keys(scheduleData).forEach(dateStr => {
                if (scheduleData[dateStr][group]) {
                    const dateObj = new Date(dateStr);
                    const dayName = rusDays[dateObj.getDay()];
                    // Форматирование даты
                    const shortDate = dateObj.toLocaleDateString('ru-RU', {day: '2-digit', month: '2-digit'});
                    
                    let opt = document.createElement('option');
                    opt.value = dateStr;
                    opt.innerText = `${shortDate} (${dayName})`;
                    daySelect.appendChild(opt);
                }
            });
            render();
        }

        function render() {
            const dateKey = document.getElementById('daySelect').value;
            const group = document.getElementById('groupSelect').value;
            const container = document.getElementById('scheduleContainer');
            
            container.innerHTML = '';
            if (!dateKey || !group) return;

            const lessons = scheduleData[dateKey][group];

            Object.keys(lessons).sort((a,b) => parseInt(a)-parseInt(b)).forEach(slot => {
                const text = lessons[slot];
                const parts = text.split('\n');
                
                container.innerHTML += `
                    <div class="card bg-white p-4 rounded-2xl shadow-sm">
                        <div class="text-xs font-semibold text-blue-400 mb-1">ПАРА ${slot}</div>
                        <div class="font-bold text-gray-800 leading-tight">${parts[0]}</div>
                        <div class="text-sm text-gray-600 mt-1">${parts[1] || ''}</div>
                    </div>
                `;
            });
        }

        window.Telegram.WebApp.ready();
        window.Telegram.WebApp.expand();
        load();
    </script>
</body>
</html>
