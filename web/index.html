<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Расписание занятий</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background-color: #f0f2f5; }
        .card {
            border-left: 4px solid #3b82f6;
            transition: transform 0.1s;
        }
        .card:active { transform: scale(0.98); }
        select {
            -webkit-appearance: none;
            appearance: none;
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
            background-repeat: no-repeat; background-position: right 1rem center; background-size: 1em;
        }
    </style>
</head>
<body class="p-4 text-gray-800">
    <div class="max-w-md mx-auto">
        <h1 class="text-2xl font-bold text-center mb-6 text-blue-600">Расписание занятий</h1>

        <!-- Селекторы -->
        <div class="space-y-3 mb-8">
            <label class="block">
                <span class="text-sm text-gray-500 ml-2">Учебная группа</span>
                <select id="groupSelect" class="w-full mt-1 p-3 rounded-2xl bg-white border-none shadow-sm focus:ring-2 focus:ring-blue-400 outline-none"></select>
            </label>
            
            <label class="block">
                <span class="text-sm text-gray-500 ml-2">День недели</span>
                <select id="daySelect" class="w-full mt-1 p-3 rounded-2xl bg-white border-none shadow-sm focus:ring-2 focus:ring-blue-400 outline-none">
                    <option value="Понедельник">Понедельник</option>
                    <option value="Вторник">Вторник</option>
                    <option value="Среда">Среда</option>
                    <option value="Четверг">Четверг</option>
                    <option value="Пятница">Пятница</option>
                </select>
            </label>
        </div>

        <div id="scheduleContainer" class="space-y-4">
        </div>
    </div>

    <script>
        let scheduleData = {};

        // Загрузка
        async function load() {
            try {
                const response = await fetch('result.json?v=' + Date.now());
                scheduleData = await response.json();
                
                init();
            } catch (e) {
                document.getElementById('scheduleContainer').innerHTML = 
                    `<div class="text-center text-red-500 py-10">Ошибка загрузки данных</div>`;
            }
        }

        function init() {
            const groupSelect = document.getElementById('groupSelect');
            
            let allGroups = new Set();
            Object.values(scheduleData).forEach(dayGroups => {
                Object.keys(dayGroups).forEach(g => allGroups.add(g));
            });

            [...allGroups].sort().forEach(g => {
                let opt = document.createElement('option');
                opt.value = g; opt.innerText = g;
                groupSelect.appendChild(opt);
            });

            groupSelect.onchange = render;
            document.getElementById('daySelect').onchange = render;
            
            render();
        }

        function render() {
            const day = document.getElementById('daySelect').value;
            const group = document.getElementById('groupSelect').value;
            const container = document.getElementById('scheduleContainer');
            container.innerHTML = '';

            if (!scheduleData[day] || !scheduleData[day][group] || Object.keys(scheduleData[day][group]).length === 0) {
                container.innerHTML = `
                    <div class="text-center py-20 opacity-40">
                        <div class="text-4xl mb-2">🏖️</div>
                        <p>Занятий нет</p>
                    </div>`;
                return;
            }

            const lessons = scheduleData[day][group];
            
            Object.keys(lessons).sort().forEach(slot => {
                const info = lessons[slot];
                const parts = info.split('\n');
                
                container.innerHTML += `
                    <div class="card bg-white p-4 rounded-2xl shadow-sm border-l-4">
                        <div class="text-xs font-semibold text-blue-400 mb-1">ПАРА ${slot}</div>
                        <div class="font-bold text-gray-800 mb-1 leading-tight">${parts[0]}</div>
                        <div class="text-sm text-gray-600">${parts[1] || ''}</div>
                        ${parts[2] ? `<div class="text-xs text-blue-500 mt-2 font-medium">Каб: ${parts[2]}</div>` : ''}
                    </div>
                `;
            });
        }

        window.Telegram.WebApp.ready();
        window.Telegram.WebApp.expand();
        load();
    </script>
</body>
</html>
